<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Seleções</h2>

  <div class="d-flex gap-2 align-items-center">
    <!-- ORDER SELECT -->
    <select
      class="form-select form-select-sm"
      [(ngModel)]="orderBy"
      (change)="ordenar()"
      style="width: 180px"
    >
      <option value="">Ordenar por...</option>
      <option value="pais">País</option>
      <option value="confederacao">Confederação</option>
      <option value="treinador">Treinador</option>
      <option value="rankingFifa">Ranking FIFA</option>
    </select>

    <!-- BOTÃO ASC/DESC -->
    <button
      class="btn btn-outline-primary btn-sm square-btn"
      (click)="toggleOrder()"
      title="Alternar ordem"
    >
      <i class="bi" [ngClass]="isAsc ? 'bi-sort-up' : 'bi-sort-down'"></i>
    </button>

    <!-- CRIAR -->
    <button class="btn btn-success" [routerLink]="['/selecoes/new']">+ Criar Seleção</button>
  </div>
</div>

@if (loading()) {
  <div class="text-center">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">A carregar...</span>
    </div>
    <p class="mt-2">A carregar...</p>
  </div>
} @else {
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>Bandeira</th>
        <th>País</th>
        <th>Confederação</th>
        <th>Treinador</th>
        <th>Ranking FIFA</th>
        <th>Opções</th>
      </tr>
    </thead>
    <tbody>
      @for (s of selecoes(); track s.id) {
        <tr>
          <td>
            <img [src]="s.flag" width="40" class="rounded" alt="Bandeira de {{ s.pais }}" />
          </td>
          <td>{{ s.pais }}</td>
          <td>{{ s.confederacao }}</td>
          <td>{{ s.treinador }}</td>
          <td>{{ s.rankingFifa }}</td>

          <td>
            <button class="btn btn-sm btn-info me-1" [routerLink]="['/selecoes', s.id]">Ver</button>
            <button
              class="btn btn-sm btn-warning me-1"
              [routerLink]="['/selecoes/' + s.id + '/edit']"
            >
              Editar
            </button>
            <button class="btn btn-sm btn-danger" (click)="apagarSelecao(s.id)">Apagar</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
}

<div class="container mt-4">
  @if (loading()) {
    <div class="text-center">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">A carregar...</span>
      </div>
      <p class="mt-2">A carregar...</p>
    </div>
  } @else {
    <div class="card shadow p-4">
      <h2 class="mb-4">
        {{ modoEdicao ? 'Editar Jogador' : 'Criar Jogador' }}
      </h2>

      <div class="row">
        <div class="col-md-8 mb-3">
          <label class="form-label">Foto URL</label>
          <input type="text" class="form-control" [(ngModel)]="jogador.fotoUrl" />
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Nome</label>
          <input type="text" class="form-control" [(ngModel)]="jogador.name" />
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Seleção</label>
          <select class="form-select" [(ngModel)]="jogador.teamId">
            @for (s of selecoes; track s.id) {
              <option value="{{ s.id }}">{{ s.country }}</option>
            }
          </select>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Número</label>
          <input type="number" class="form-control" [(ngModel)]="jogador.number" />
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Posição</label>
          <input type="text" class="form-control" [(ngModel)]="jogador.position" />
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Clube</label>
          <input type="text" class="form-control" [(ngModel)]="jogador.club" />
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Jogos</label>
          <input type="number" class="form-control" [(ngModel)]="jogador.caps" />
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Golos</label>
          <input type="number" class="form-control" [(ngModel)]="jogador.goals" />
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Data de Nascimento</label>
          <input type="date" class="form-control" [(ngModel)]="jogador.birthDate" />
        </div>

        <div class="col-md-6 mb-3 d-flex align-items-center">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" [(ngModel)]="jogador.isStartingXI" />
            <label class="form-check-label"> Titular </label>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-secondary" [routerLink]="['/jogadores']">Cancelar</button>

        <button class="btn btn-success" (click)="guardarDados()">
          {{ modoEdicao ? 'Atualizar' : 'Criar' }}
        </button>
      </div>
    </div>
  }
</div>

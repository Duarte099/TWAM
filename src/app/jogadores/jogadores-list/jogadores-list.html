<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Jogadores</h2>

  <div class="d-flex gap-2 align-items-center">
    <!-- ORDER SELECT -->
    <select
      class="form-select form-select-sm"
      [(ngModel)]="orderBy"
      (change)="ordenar()"
      style="width: 180px"
    >
      <option value="">Ordenar por...</option>
      <option value="nome">Nome</option>
      <option value="idade">Idade</option>
      <option value="numero">Número</option>
      <option value="posicao">Posição</option>
      <option value="clube">Clube</option>
      <option value="numJogos">Jogos</option>
      <option value="numGolos">Golos</option>
    </select>

    <!-- BOTÃO ASC/DESC -->
    <button
      class="btn btn-outline-primary btn-sm square-btn"
      (click)="toggleOrder()"
      title="Alternar ordem"
    >
      <i class="bi" [ngClass]="isAsc ? 'bi-sort-up' : 'bi-sort-down'"></i>
    </button>

    <!-- CRIAR -->
    <button class="btn btn-success" [routerLink]="['/jogadores/new']">+ Criar Jogador</button>
  </div>
</div>

@if (loading()) {
  <div class="text-center">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">A carregar...</span>
    </div>
    <p class="mt-2">A carregar...</p>
  </div>
} @else {
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>Foto</th>
        <th>Seleção</th>
        <th>Nome</th>
        <th>Idade</th>
        <th>Número</th>
        <th>Posição</th>
        <th>Clube</th>
        <th>Jogos</th>
        <th>Golos</th>
        <th>Opções</th>
      </tr>
    </thead>
    <tbody>
      @for (j of jogadores(); track j.id) {
        <tr [class.table-success]="j.titular">
          <td>
            <img [src]="j.foto" width="40" class="rounded-circle" />
          </td>
          <td>
            <a [routerLink]="['/selecoes', j.idSelecao]">{{ j.selecao }}</a>
          </td>
          <td>{{ j.nome }}</td>
          <td>{{ j.idade }}</td>
          <td>{{ j.numero }}</td>
          <td>{{ j.posicao }}</td>
          <td>{{ j.clube }}</td>
          <td>{{ j.numJogos }}</td>
          <td>{{ j.numGolos }}</td>

          <td>
            <button class="btn btn-sm btn-info me-1" [routerLink]="['/jogadores', j.id]">
              Ver
            </button>
            <button
              class="btn btn-sm btn-warning me-1"
              [routerLink]="['/jogadores/' + j.id + '/edit']"
            >
              Editar
            </button>
            <button class="btn btn-sm btn-danger" (click)="apagarJogador(j.id)">Apagar</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
}
